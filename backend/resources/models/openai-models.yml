# OVERRIDE do models/openai-models.yml do starter-openai — o resources/ do app
# vence no classpath. Modelos validados contra o endpoint NVIDIA free (jul/2026):
# glm-5.2 é o default (SCHOOL_MODEL troca); deepseek-v4-pro e inkling como
# alternativas parrudas. moonshotai/kimi-k2.6 aparece no /v1/models mas dá 404
# nesta conta (sem acesso no free tier) — por isso não está registrado.
models:
  - name: "z-ai/glm-5.2"
    model_id: "z-ai/glm-5.2"
    display_name: "GLM 5.2 (Z.ai via NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "deepseek-ai/deepseek-v4-pro"
    model_id: "deepseek-ai/deepseek-v4-pro"
    display_name: "DeepSeek V4 Pro (NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "thinkingmachines/inkling"
    model_id: "thinkingmachines/inkling"
    display_name: "Inkling (Thinking Machines via NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "qwen/qwen3.5-397b-a17b"
    model_id: "qwen/qwen3.5-397b-a17b"
    display_name: "Qwen 3.5 397B (NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "nvidia/nemotron-3-nano-30b-a3b"
    model_id: "nvidia/nemotron-3-nano-30b-a3b"
    display_name: "Nemotron 3 Nano 30B (NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
