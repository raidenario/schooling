# OVERRIDE do models/openai-models.yml do starter-openai — o resources/ do app
# vence no classpath. Modelos provados pelo embabel-lab (jul/2026, NVIDIA free):
# qwen3.5-397b o mais consistente (default); ver benchmark no concierge.
models:
  - name: "qwen/qwen3.5-397b-a17b"
    model_id: "qwen/qwen3.5-397b-a17b"
    display_name: "Qwen 3.5 397B (NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "nvidia/nemotron-3-nano-30b-a3b"
    model_id: "nvidia/nemotron-3-nano-30b-a3b"
    display_name: "Nemotron 3 Nano 30B (NVIDIA)"
    max_tokens: 8192
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0

  - name: "z-ai/glm-5.2"
    model_id: "z-ai/glm-5.2"
    display_name: "GLM 5.2 (Z.ai via NVIDIA)"
    max_tokens: 4096
    temperature: 0.6
    pricing_model:
      usd_per1m_input_tokens: 0.0
      usd_per1m_output_tokens: 0.0
